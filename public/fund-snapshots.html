<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Public Funds Snapshots — March 4, 2026</title>
<style>
body { font-family: Calibri, 'Segoe UI', Arial, sans-serif; margin: 0; padding: 20px; background: #fff; }
.nav { display: flex; gap: 12px; margin-bottom: 20px; }
.nav button { padding: 10px 20px; font-size: 14px; font-weight: 600; border: 1px solid #2874A6; border-radius: 4px; cursor: pointer; }
.nav button.active { background: #2874A6; color: #fff; }
.nav button:not(.active) { background: #fff; color: #2874A6; }
.section { display: none; }
.section.active { display: block; }
.pdf-container { width: 100%; height: 90vh; }
.pdf-container iframe { width: 100%; height: 100%; border: none; }
.email-container { max-width: 100%; overflow-x: auto; }
</style>
</head>
<body>

<div class="nav">
<button class="active" onclick="show('snapshots', this)">Fund Snapshots (PDF)</button>
<button onclick="show('monitoring', this)">Performance Monitoring</button>
</div>

<div id="snapshots" class="section active">
<div class="pdf-container">
<iframe src="/PublicSnapshots_20260304.pdf"></iframe>
</div>
</div>

<div id="monitoring" class="section">
<div class="email-container">
<iframe src="/performance-monitoring.html" style="width:100%; height:90vh; border:none;"></iframe>
</div>
</div>

<script>
function show(id, btn) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  btn.classList.add('active');
}
</script>
</body>
</html>
